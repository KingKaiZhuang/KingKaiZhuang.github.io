<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="icon" href="./images/as2va-8k5n2-001.ico">
    <link rel="stylesheet" href="./global.css">
    <link rel="stylesheet" href="./grid.css">
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <input type="checkbox" name="" id="side-menu-switch">

    <div class="side-menu">
        <nav>
            <img src="./images/my-picture.jpg" alt="" class="intorduce-img">
            <h3 class="menu-font">STUST</h3>
            <h4 class="menu-font">五專資工三甲</h4>
            <p class="menu-font">莊鈞凱</p>
            <p class="menu-font">Zhuang</p>
            <p class="menu-font">Jun</p>
            <p class="menu-font">Kai</p>                 
        </nav>
        <label for="side-menu-switch">
            <i class="fa-solid fa-chevron-right"></i>
        </label>
    </div>
    <div class="my-introduce">
        <a href="#" class="nav-toggle collapse-btn fa-solid fa-bars"></a>
        <div class="menu-right">
            <a href="#" style="font-size: 1.5rem;">KingKaiZhuang</a>
            <a href="#">我的公司</a>
            <a href="#">學習心得</a>

        </div>
    </div>
    <div class="welcome">
        <h1 class="logo fa-regular fa-circle-user">King_Kai_Zhuang</h1>
        <div class="hobby">
            <h2></h2>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.0/jquery.min.js" integrity="sha512-3gJwYpMe3QewGELv8k/BX9vcqhryRdzRMxVfq6ngyWXwo03GFEzjsUm8Q7RZcHPHksttq7/GFoxjCVUjkjvPdw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
        let collapseBtns = document.querySelectorAll('.collapse-btn');
        for(collapseBtn of collapseBtns){
            collapseBtn.onclick = e => {
                let panel = e.target.nextElementSibling;
                e.target.classList.toggle('active');
                panel.classList.toggle('active');
                console.log(panel.style.width);
                if(panel.style.width){
                    panel.style.width = null;
                }else{
                    panel.style.width = 250 + 'px';
                }
                e.preventDefault();
            }
        }  

    </script>
</body>
</html>
